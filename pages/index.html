<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ORCA-CRM</title>
    <style>
      :root{color-scheme:dark}
      body{margin:0;background:#09090b;color:#fafafa;font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
      .wrap{max-width:920px;margin:0 auto;padding:32px}
      .card{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04);border-radius:16px;padding:18px}
      h1{font-size:20px;margin:0 0 6px}
      p{margin:0 0 14px;color:rgba(255,255,255,.75)}
      a{display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);border-radius:12px;padding:12px 14px;color:#fff;text-decoration:none}
      a:hover{border-color:rgba(249,115,22,.45)}
      .grid{display:grid;gap:12px;grid-template-columns:1fr}
      @media (min-width:720px){.grid{grid-template-columns:1fr 1fr}}
      .tag{font-size:12px;color:rgba(255,255,255,.7)}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>ORCA-CRM</h1>
        <p>Choose an app to open.</p>
        <div class="grid">
          <a href="./ics/">
            <div>
              <div>ICS (Main App)</div>
              <div class="tag">Operations / POS / Admin</div>
            </div>
          </a>
          <a href="./kds/">
            <div>
              <div>KDS (Kitchen Display)</div>
              <div class="tag">Kitchen queue / stations</div>
            </div>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
